<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Petix</title>
    <meta name="description" content="AI-Driven Battleground" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Petix" />
    <meta property="og:description" content="AI-Driven Battleground" />
    <meta property="og:image" content="/assets/og-image.png" />
    <meta property="og:image:alt" content="Petix social preview image" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Petix" />
    <meta name="twitter:description" content="AI-Driven Battleground" />
    <meta name="twitter:image" content="/assets/og-image.png" />
    <meta name="twitter:site" content="@petixfun" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <link rel="shortcut icon" href="/assets/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600&family=Fraunces:wght@600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260309c" />
    <script
      src="https://unpkg.com/@dotlottie/player-component@2.7.12/dist/dotlottie-player.mjs"
      type="module"
    ></script>
  </head>
  <body>
    <main class="page">
      <button class="connect-trigger" id="connectTrigger" type="button">
        Connect wallet
      </button>
      <div class="wallet-menu hidden" id="walletMenu">
        <button class="wallet-menu-item" id="walletMenuCreatePet" type="button">Create new pet</button>
        <button class="wallet-menu-item" id="walletMenuDashboard" type="button">Dashboard</button>
        <button class="wallet-menu-item hidden" id="walletMenuAdmin" type="button">Admin panel</button>
        <button class="wallet-menu-item" id="walletMenuLogout" type="button">Log Out</button>
      </div>

      <img
        class="logo"
        src="https://static.tildacdn.com/tild3965-3062-4164-a637-343632663861/petix_logo_header.svg"
        alt="Petix logo"
        width="118"
        height="40"
      />

      <div class="lottie-wrap" aria-hidden="true">
        <dotlottie-player
          src="https://lottie.host/eba95216-34ba-4d7a-8e5c-a0d6a79809ec/aJMkvrY7MJ.lottie"
          background="transparent"
          speed="1"
          style="width: 280px; height: 280px"
          loop
          autoplay
        ></dotlottie-player>
      </div>

      <h1 class="title">Pets are on the way...</h1>
      <p class="subtitle">Come back soon</p>

      <a class="twitter" href="https://x.com/petixfun">Follow us on X</a>
    </main>

    <div class="wallet-overlay hidden" id="walletOverlay" aria-hidden="true">
      <section
        class="wallet-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="walletModalTitle"
      >
        <button class="wallet-close" id="walletClose" type="button" aria-label="Close">
          ×
        </button>

        <div class="wallet-panel" id="walletAuthPanel">
          <h2 class="wallet-title" id="walletModalTitle">Connect wallet to Sign In</h2>

          <div class="wallet-list">
            <button class="wallet-item" data-wallet="phantom" type="button">
              <span class="wallet-icon">
                <img
                  class="wallet-icon-image"
                  src="/assets/wallets/phantom.svg"
                  alt="Phantom logo"
                  width="24"
                  height="24"
                />
              </span>
              <span class="wallet-name">Phantom</span>
              <span class="wallet-detected hidden" data-detected-for="phantom">Detected</span>
              <span class="wallet-arrow">›</span>
            </button>

            <button class="wallet-item" data-wallet="solflare" type="button">
              <span class="wallet-icon">
                <img
                  class="wallet-icon-image"
                  src="/assets/wallets/solflare.svg"
                  alt="Solflare logo"
                  width="24"
                  height="24"
                />
              </span>
              <span class="wallet-name">Solflare</span>
              <span class="wallet-detected hidden" data-detected-for="solflare">Detected</span>
              <span class="wallet-arrow">›</span>
            </button>

            <button class="wallet-item" data-wallet="trust" type="button">
              <span class="wallet-icon">
                <img
                  class="wallet-icon-image"
                  src="/assets/wallets/trust-wallet.svg"
                  alt="Trust Wallet logo"
                  width="24"
                  height="24"
                />
              </span>
              <span class="wallet-name">Trust Wallet</span>
              <span class="wallet-detected hidden" data-detected-for="trust">Detected</span>
              <span class="wallet-arrow">›</span>
            </button>
          </div>

          <p class="wallet-status" id="walletStatus" aria-live="polite"></p>

          <footer class="wallet-footer">
            By connecting your wallet, you agree to our
            <a href="#" aria-label="Terms of Use">Terms of Use</a>
            and
            <a href="#" aria-label="Privacy Policy">Privacy Policy</a>
          </footer>
        </div>

        <div class="wallet-panel hidden" id="walletLoggedPanel">
          <h2 class="wallet-title">You are logged in</h2>
          <p class="logged-wallet" id="loggedWalletAddress"></p>
          <button class="logout-btn" id="continueBtn" type="button">Continue</button>
        </div>
      </section>
    </div>

    <script src="./app.js?v=20260309c"></script>
  </body>
</html>
