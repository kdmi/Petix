<!doctype html>
<html lang="en">

    <title>Petix - Battle Result Mobile Preview</title>
    <meta name="description" content="Static mobile battle result preview without authentication" />
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        align-items: center;
        background: #2f2f2f;

        justify-content: center;
